name: Compatibility (Node)

on:
  workflow_call:
    inputs:
      node-versions:
        description: 'JSON array of Node.js versions to test against (e.g. ''["20","22","24"]'').'
        required: true
        type: string

permissions:
  contents: read

jobs:
  per-node:
    name: per-node
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(inputs.node-versions) }}
    permissions:
      contents: read
    env:
      MISE_NODE_VERSION: ${{ matrix.node }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: false
      - run: bash compatibility.sh

  compatibility-node:
    name: compatibility-node
    needs:
      - per-node
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - env:
          RESULT: ${{ needs.per-node.result }}
        run: '[ "$RESULT" = "success" ]'
