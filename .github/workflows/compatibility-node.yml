name: Compatibility (Node)

on:
  workflow_call:
    inputs:
      node-versions:
        description: 'JSON array of Node.js versions to test against (e.g. ''["20","22","24"]'').'
        required: true
        type: string

permissions:
  contents: read

jobs:
  per-node:
    name: per-node
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(inputs.node-versions) }}
    permissions:
      contents: read
    env:
      MISE_NODE_VERSION: ${{ matrix.node }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: false
      - run: bash compatibility.sh

  compatibility-node:
    name: compatibility-node
    needs:
      - per-node
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - run: 'true'
