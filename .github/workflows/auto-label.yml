name: 'Auto label by title'

on:
  workflow_call:
  pull_request:
    types: [opened]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  label:
    name: label
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: write  # to add a label to the PR
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Apply release-note label from Conventional Commits prefix
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          # Always: breaking-change marker ('!' before ':') -> add 'breaking' label.
          # Idempotent: gh pr edit --add-label is a no-op if already present.
          if echo "$TITLE" | grep -qE '^[a-zA-Z]+(\([^)]+\))?!:'; then
            gh pr edit "$PR" --repo "$REPO" --add-label breaking
            echo "Marked breaking"
          fi

          # Parse Conventional Commits prefix and scope
          prefix=$(echo "$TITLE" | sed -nE 's/^([a-zA-Z]+)(\([^)]+\))?!?:.*/\1/p' | tr '[:upper:]' '[:lower:]')
          scope=$(echo "$TITLE" | sed -nE 's/^[a-zA-Z]+\(([^)]+)\)!?:.*/\1/p' | tr '[:upper:]' '[:lower:]')

          # scope=deps takes precedence over the type mapping (handles Renovate's
          # `chore(deps):` and `fix(deps):` uniformly).
          if [ "$scope" = "deps" ]; then
            label=dependencies
          else
            case "$prefix" in
              feat)       label=feature ;;
              fix)        label=bugfix ;;
              chore|docs) label=maintenance ;;
              *)          echo "No matching prefix in title: $TITLE"; exit 0 ;;
            esac
          fi

          gh pr edit "$PR" --repo "$REPO" --add-label "$label"
          echo "Labeled: $label"
