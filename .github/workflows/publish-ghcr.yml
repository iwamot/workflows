name: Publish to GitHub Container Registry

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub Actions environment to run in'
        type: string
        default: production
    secrets:
      dockerhub_username:
        description: 'Docker Hub username for dhi.io login (optional)'
        required: false
      dockerhub_token:
        description: 'Docker Hub token for dhi.io login (optional)'
        required: false

permissions:
  contents: read

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  publish-ghcr:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hardened Images
        if: env.DOCKERHUB_USERNAME != ''
        env:
          DOCKERHUB_USERNAME: ${{ secrets.dockerhub_username }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: dhi.io
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - uses: iwamot/actions/docker-build-digest@792bb6f7b66b5d046aa285d39303a0aa7b10f822 # v0.5.0
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}
          platform: ${{ matrix.platform }}

  merge-and-sign:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      packages: write
    needs:
      - publish-ghcr
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: iwamot/actions/docker-merge-and-sign@792bb6f7b66b5d046aa285d39303a0aa7b10f822 # v0.5.0
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}
