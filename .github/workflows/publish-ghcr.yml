name: Publish to GitHub Container Registry

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub Actions environment to run in'
        type: string
        default: production
    secrets:
      dockerhub_username:
        description: 'Docker Hub username for dhi.io login (optional)'
        required: false
      dockerhub_token:
        description: 'Docker Hub token for dhi.io login (optional)'
        required: false

permissions:
  contents: read

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  publish-ghcr:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check dhi.io credentials
        id: dhi-check
        env:
          DOCKERHUB_USERNAME: ${{ secrets.dockerhub_username }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hardened Images
        if: steps.dhi-check.outputs.enabled == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: dhi.io
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - uses: iwamot/actions/docker-build-digest@cf0049402c5779ec08563b1e8067d25f8df7aef2 # v0.1.2
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}
          platform: ${{ matrix.platform }}

  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    needs:
      - publish-ghcr
    outputs:
      version: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=semver,pattern={{version}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          readarray -t tag_names < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          tag_args=()
          for tag in "${tag_names[@]}"; do
            tag_args+=("-t" "$tag")
          done
          readarray -t digest_array < <(printf "${REGISTRY_IMAGE}@sha256:%s\n" *)
          docker buildx imagetools create "${tag_args[@]}" "${digest_array[@]}"

      - name: Get image digest
        id: digest
        env:
          STEPS_META_OUTPUTS_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          digest=$(docker buildx imagetools inspect "${REGISTRY_IMAGE}:${STEPS_META_OUTPUTS_VERSION}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      packages: write
    needs:
      - merge
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: iwamot/actions/docker-sign-sbom@cf0049402c5779ec08563b1e8067d25f8df7aef2 # v0.1.2
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}
          digest: ${{ needs.merge.outputs.digest }}
