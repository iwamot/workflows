name: Compatibility (Python)

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions to test against (e.g. ''["3.11","3.12","3.13","3.14"]'').'
        required: true
        type: string

permissions:
  contents: read

jobs:
  per-python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(inputs.python-versions) }}
    permissions:
      contents: read
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: false
      - run: bash compatibility.sh

  compatibility-python:
    needs:
      - per-python
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    steps:
      - run: 'true'
