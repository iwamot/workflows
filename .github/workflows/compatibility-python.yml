name: Compatibility (Python)

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions to test against (e.g. ''["3.11","3.12","3.13","3.14"]'').'
        required: true
        type: string

permissions:
  contents: read

jobs:
  per-python:
    name: per-python
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(inputs.python-versions) }}
    permissions:
      contents: read
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: false
      - run: bash compatibility.sh

  compatibility-python:
    name: compatibility-python
    needs:
      - per-python
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - env:
          RESULT: ${{ needs.per-python.result }}
        run: '[ "$RESULT" = "success" ]'
