name: Compatibility (Python)

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'JSON array of Python versions to test against (e.g. ''["3.11","3.12","3.13","3.14"]'').'
        required: true
        type: string

permissions:
  contents: read

jobs:
  per-python:
    name: per-python
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(inputs.python-versions) }}
    permissions:
      contents: read
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: false
      - run: bash compatibility.sh

  compatibility-python:
    name: compatibility-python
    needs:
      - per-python
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - env:
          RESULT: ${{ needs.per-python.result }}
        run: '[ "$RESULT" = "success" ]'
