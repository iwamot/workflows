name: Release with Homebrew tap update

on:
  workflow_call:
    inputs:
      cask_name:
        description: 'Cask file name without .rb. The matching .rb file is located under dist/ (typically dist/homebrew/Casks/<cask_name>.rb as GoReleaser writes by default) and uploaded to Casks/<cask_name>.rb in the tap. Also used as part of the PR title / branch name. Defaults to the caller repository name.'
        type: string
        default: ${{ github.event.repository.name }}
      environment:
        description: 'GitHub Actions environment to run in'
        type: string
        default: production
    secrets:
      homebrew_tap_app_client_id:
        description: 'GitHub App client ID for the iwamot/homebrew-tap repo'
        required: true
      homebrew_tap_app_private_key:
        description: 'GitHub App private key for the iwamot/homebrew-tap repo'
        required: true

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: write  # to create the draft Release, upload binary archives, and publish the Release
      id-token: write  # to mint OIDC token for attestation
      attestations: write  # to write the provenance attestation
      artifact-metadata: write  # to record artifact metadata for the attestation
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: iwamot/actions/release-draft@e26fd78393da9f5ea2134cbf1e7c50ceeec931ad # v2.0.0

      - uses: iwamot/actions/go-publish@e26fd78393da9f5ea2134cbf1e7c50ceeec931ad # v2.0.0

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: tap-token
        with:
          client-id: ${{ secrets.homebrew_tap_app_client_id }}
          private-key: ${{ secrets.homebrew_tap_app_private_key }}
          owner: iwamot
          repositories: homebrew-tap
          permission-contents: write  # createCommitOnBranch on the cask update branch
          permission-pull-requests: write  # open and auto-merge the cask PR

      - name: Submit cask PR to homebrew-tap
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          CASK_NAME: ${{ inputs.cask_name }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          CASK_FILE=$(find dist -name "${CASK_NAME}.rb" -type f | head -n1)
          if [ -z "${CASK_FILE}" ]; then
            echo "Cask file ${CASK_NAME}.rb not found under dist/" >&2
            exit 1
          fi
          CONTENTS_B64=$(base64 -w0 < "${CASK_FILE}")
          BRANCH="cask-update-${CASK_NAME}-${TAG}"
          BOT_NAME="iwamot-homebrew-tap[bot]"
          BOT_EMAIL="284326920+iwamot-homebrew-tap[bot]@users.noreply.github.com"
          TITLE="feat: brew cask update for ${CASK_NAME} version ${TAG}"

          gh api -X DELETE "/repos/iwamot/homebrew-tap/git/refs/heads/${BRANCH}" 2>/dev/null || true

          MAIN_SHA=$(gh api /repos/iwamot/homebrew-tap/git/refs/heads/main --jq '.object.sha')

          gh api -X POST /repos/iwamot/homebrew-tap/git/refs \
            -f ref="refs/heads/${BRANCH}" \
            -f sha="${MAIN_SHA}" >/dev/null

          QUERY=$(cat <<'GRAPHQL'
          mutation($repo: String!, $branch: String!, $headline: String!, $body: String!, $path: String!, $contents: Base64String!, $oid: GitObjectID!) {
            createCommitOnBranch(input: {
              branch: { repositoryNameWithOwner: $repo, branchName: $branch }
              message: { headline: $headline, body: $body }
              fileChanges: { additions: [{ path: $path, contents: $contents }] }
              expectedHeadOid: $oid
            }) { commit { oid } }
          }
          GRAPHQL
          )

          gh api graphql -f query="${QUERY}" \
            -f repo="iwamot/homebrew-tap" \
            -f branch="${BRANCH}" \
            -f headline="${TITLE}" \
            -f body="Signed-off-by: ${BOT_NAME} <${BOT_EMAIL}>" \
            -f path="Casks/${CASK_NAME}.rb" \
            -f contents="${CONTENTS_B64}" \
            -f oid="${MAIN_SHA}" >/dev/null

          gh pr create -R iwamot/homebrew-tap \
            --head "${BRANCH}" \
            --base main \
            --title "${TITLE}" \
            --body "Automated cask update from ${CASK_NAME} ${TAG} release."

          gh pr merge -R iwamot/homebrew-tap "${BRANCH}" \
            --squash --auto --delete-branch

      - uses: iwamot/actions/release-publish@e26fd78393da9f5ea2134cbf1e7c50ceeec931ad # v2.0.0
