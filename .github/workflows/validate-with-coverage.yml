name: Validate with coverage

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-with-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: iwamot/actions/mise-validate@0489968d51644c06c8e85c059a023722a9c0b057 # v0.2.1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          use_oidc: true
