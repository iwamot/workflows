name: Validate with coverage

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-with-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: iwamot/actions/mise-validate@4af61e2e53c86f9f8ae386c6a06ee2ac8f466690 # v0.2.0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          use_oidc: true
