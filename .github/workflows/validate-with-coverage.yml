name: Validate with coverage

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-with-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: iwamot/actions/mise-validate@792bb6f7b66b5d046aa285d39303a0aa7b10f822 # v0.5.0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          use_oidc: true
