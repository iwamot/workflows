name: Validate with coverage

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-with-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: iwamot/actions/mise-validate@b7e018129d96b7170299c823014121079bce06d0 # v0.4.0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          use_oidc: true
