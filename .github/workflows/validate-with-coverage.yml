name: Validate with coverage

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-with-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: iwamot/actions/mise-validate@e4d25240128ef30fb69dbc5abd8888b2a85b5eb6 # v0.3.1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          use_oidc: true
