name: Validate with coverage

on:
  workflow_call:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-with-coverage:
    name: validate-with-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write  # for Codecov OIDC upload
    steps:
      - uses: iwamot/actions/mise-validate@08456ce23ea73c42a50d71bd5a067d5ad68dc7e9 # v0.7.0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          use_oidc: true
