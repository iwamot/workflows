name: Oide

on:
  workflow_call:
    # The two secrets below are reused from the iwamot-renovate App.
    # Ideally Oide would have its own dedicated App for cleaner
    # separation; deferred to keep the operational footprint small.
    secrets:
      RENOVATE_APP_ID:
        required: true
        description: 'GitHub App ID with contents:write and pull-requests:write'
      RENOVATE_PRIVATE_KEY:
        required: true
        description: 'GitHub App private key (PEM)'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/oide.yml

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # renovate: datasource=github-tags depName=iwamot/repo-template
  TEMPLATE_VERSION: v1.1.0

jobs:
  pull:
    name: pull
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production  # so env-scoped RENOVATE_* secrets are accessible on self-run
    permissions:
      contents: read  # write operations go through the App token
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}
          permission-contents: write       # to push the branch
          permission-pull-requests: write  # to open the PR
          permission-issues: write         # to create the operations label

      - uses: iwamot/oide@a675e15dafb6ace4e76f5aa214327c6660fb3522 # v0.0.2
        with:
          source: iwamot/repo-template@${{ env.TEMPLATE_VERSION }}

      - name: Open or update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          BRANCH: oide/pull
          TITLE: 'chore: pull files via oide'
          BODY: 'Pulled from [iwamot/repo-template@${{ env.TEMPLATE_VERSION }}](https://github.com/iwamot/repo-template/tree/${{ env.TEMPLATE_VERSION }}) via [oide](https://github.com/iwamot/oide).'
          LABEL: operations
        run: |
          set -euo pipefail

          # Use the App's bot identity as the commit author. /user is not
          # accessible with installation tokens, but /users/<login> is a
          # public endpoint and works.
          bot="${APP_SLUG}[bot]"
          bot_id=$(gh api "/users/${bot}" --jq '.id')
          git config user.name "$bot"
          git config user.email "${bot_id}+${bot}@users.noreply.github.com"

          # Ensure the label exists (idempotent — same convention Renovate uses
          # for its `dependencies` label).
          gh label create "$LABEL" \
            --color 1d76db \
            --description "Routine operational changes from automation" \
            2>/dev/null || true

          git add -A
          if git diff --cached --quiet; then
            echo "No changes; nothing to PR"
            exit 0
          fi

          git checkout -B "$BRANCH"
          git commit -m "$TITLE"

          auth=$(printf '%s' "x-access-token:${GH_TOKEN}" | base64 -w0)
          git -c "http.extraheader=Authorization: Basic ${auth}" push -f origin "$BRANCH"

          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')" ]; then
            gh pr create --head "$BRANCH" --title "$TITLE" --body "$BODY" --label "$LABEL"
          else
            echo "PR already open for $BRANCH; updated by force-push"
            gh pr edit "$BRANCH" --add-label "$LABEL" 2>/dev/null || true
          fi

          # Enable auto-merge so the PR merges as soon as required checks
          # pass. Idempotent: re-enabling on an already-auto-merge-enabled
          # PR is a no-op.
          gh pr merge "$BRANCH" --auto --squash
