name: Oide

on:
  workflow_call:
    inputs:
      TEMPLATE_VERSION:
        type: string
        required: true
        description: 'Source ref of iwamot/repo-template. Required for callers; the workflows self-run via the push trigger uses the workflows-internal env pin instead. Named UPPER_CASE so callers can carry the standard `# renovate: datasource=...` annotation that the customManagers:githubActionsVersions preset matches against `_VERSION` keys.'
    secrets:
      OIDE_APP_CLIENT_ID:
        required: true
        description: 'iwamot-oide GitHub App Client ID'
      OIDE_APP_PRIVATE_KEY:
        required: true
        description: 'iwamot-oide GitHub App private key (PEM)'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/oide.yml

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # renovate: datasource=github-tags depName=iwamot/repo-template
  TEMPLATE_VERSION: v1.8.0

jobs:
  pull:
    name: pull
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production  # so env-scoped OIDE_APP_* secrets are accessible on self-run
    permissions:
      contents: read  # write operations go through the App token
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Resolve template version
        # workflow_call passes the caller-supplied input. The push trigger (workflows
        # self-run) doesn't go through workflow_call, so 'inputs' is empty and we fall
        # back to the workflows-internal env pin.
        env:
          INPUT_VERSION: ${{ inputs.TEMPLATE_VERSION }}
        run: echo "VERSION=${INPUT_VERSION:-${TEMPLATE_VERSION}}" >> "$GITHUB_ENV"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.OIDE_APP_CLIENT_ID }}
          private-key: ${{ secrets.OIDE_APP_PRIVATE_KEY }}
          permission-contents: write       # to push the branch
          permission-pull-requests: write  # to open the PR
          permission-issues: write         # to create the maintenance label

      - uses: iwamot/oide@2f7ce72a8acba0b4b72da05b581be8e02905e9ef # v1.3.0
        with:
          source: iwamot/repo-template@${{ env.VERSION }}

      - name: Open or update PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          BRANCH: oide/pull
          TITLE: 'chore: pull files via oide'
          BODY: 'Pulled from [iwamot/repo-template@${{ env.VERSION }}](https://github.com/iwamot/repo-template/tree/${{ env.VERSION }}) via [oide](https://github.com/iwamot/oide).'
          LABEL: maintenance
        run: |
          set -euo pipefail

          # Use the App's bot identity as the commit author. /user is not
          # accessible with installation tokens, but /users/<login> is a
          # public endpoint and works.
          bot="${APP_SLUG}[bot]"
          bot_id=$(gh api "/users/${bot}" --jq '.id')
          git config user.name "$bot"
          git config user.email "${bot_id}+${bot}@users.noreply.github.com"

          # Ensure the label exists (idempotent — same convention Renovate uses
          # for its `dependencies` label).
          gh label create "$LABEL" \
            --color 6a737d \
            --description "Maintenance updates" \
            2>/dev/null || true

          git add -A
          if git diff --cached --quiet; then
            echo "No changes; nothing to PR"
            exit 0
          fi

          git checkout -B "$BRANCH"
          git commit -m "$TITLE"

          auth=$(printf '%s' "x-access-token:${GH_TOKEN}" | base64 -w0)
          git -c "http.extraheader=Authorization: Basic ${auth}" push -f origin "$BRANCH"

          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')" ]; then
            gh pr create --head "$BRANCH" --title "$TITLE" --body "$BODY" --label "$LABEL"
          else
            echo "PR already open for $BRANCH; updated by force-push"
            gh pr edit "$BRANCH" --add-label "$LABEL" 2>/dev/null || true
          fi

          # Enable auto-merge so the PR merges as soon as required checks
          # pass. Idempotent: re-enabling on an already-auto-merge-enabled
          # PR is a no-op.
          gh pr merge "$BRANCH" --auto --squash
