name: Publish to ECR Public

on:
  workflow_call:
    inputs:
      registry_image:
        description: 'Full ECR Public image URI (e.g. public.ecr.aws/xxxxxxxx/namespace/repo)'
        type: string
        required: true
      environment:
        description: 'GitHub Actions environment to run in'
        type: string
        default: production
    secrets:
      aws_role_arn:
        description: 'IAM role ARN to assume via OIDC'
        required: true

permissions: {}

env:
  REGISTRY_IMAGE: ${{ inputs.registry_image }}
  AWS_REGION: us-east-1

jobs:
  publish-ecr-public:
    name: publish-ecr-public
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write  # to mint OIDC token for AWS role assumption
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
        with:
          registry-type: public

      - uses: iwamot/actions/docker-build-digest@08456ce23ea73c42a50d71bd5a067d5ad68dc7e9 # v0.7.0
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}
          platform: ${{ matrix.platform }}

  merge-and-sign:
    name: merge-and-sign
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write  # to mint OIDC token for AWS role assumption and image signing
    needs:
      - publish-ecr-public
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
        with:
          registry-type: public

      - uses: iwamot/actions/docker-merge-and-sign@08456ce23ea73c42a50d71bd5a067d5ad68dc7e9 # v0.7.0
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}
