name: Publish to ECR Public

on:
  workflow_call:
    inputs:
      registry_image:
        description: 'Full ECR Public image URI (e.g. public.ecr.aws/xxxxxxxx/namespace/repo)'
        type: string
        required: true
      environment:
        description: 'GitHub Actions environment to run in'
        type: string
        default: production
    secrets:
      aws_role_arn:
        description: 'IAM role ARN to assume via OIDC'
        required: true

permissions:
  contents: read

env:
  REGISTRY_IMAGE: ${{ inputs.registry_image }}
  AWS_REGION: us-east-1

jobs:
  publish-ecr-public:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a # v2.1.3
        with:
          registry-type: public

      - uses: iwamot/actions/docker-build-digest@2ed40fde20f402e4f916d6727dbe029c236b57b1 # v0.1.3
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}
          platform: ${{ matrix.platform }}

  merge-and-sign:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    needs:
      - publish-ecr-public
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a # v2.1.3
        with:
          registry-type: public

      - uses: iwamot/actions/docker-merge-and-sign@4af61e2e53c86f9f8ae386c6a06ee2ac8f466690 # v0.2.0
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}
