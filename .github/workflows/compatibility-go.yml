name: Compatibility (Go)

on:
  workflow_call:
    inputs:
      go-versions:
        description: 'JSON array of Go versions to test against (e.g. ''["1.25","1.26"]'').'
        required: true
        type: string

permissions:
  contents: read

jobs:
  per-go:
    name: per-go
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go: ${{ fromJSON(inputs.go-versions) }}
    permissions:
      contents: read
    env:
      MISE_GO_VERSION: ${{ matrix.go }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: false
      - run: bash compatibility.sh

  compatibility-go:
    name: compatibility-go
    needs:
      - per-go
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - env:
          RESULT: ${{ needs.per-go.result }}
        run: '[ "$RESULT" = "success" ]'
