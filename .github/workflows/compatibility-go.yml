name: Compatibility (Go)

on:
  workflow_call:
    inputs:
      go-versions:
        description: 'JSON array of Go versions to test against (e.g. ''["1.25","1.26"]'').'
        required: true
        type: string

permissions:
  contents: read

jobs:
  per-go:
    name: per-go
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go: ${{ fromJSON(inputs.go-versions) }}
    permissions:
      contents: read
    env:
      MISE_GO_VERSION: ${{ matrix.go }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: false
      - run: bash compatibility.sh

  compatibility-go:
    name: compatibility-go
    needs:
      - per-go
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    steps:
      - run: 'true'
