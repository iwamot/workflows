name: Release with ECR Public publish

on:
  workflow_call:
    inputs:
      registry_image:
        description: 'Full ECR Public image URI (e.g. public.ecr.aws/xxxxxxxx/namespace/repo)'
        type: string
        required: true
      environment:
        description: 'GitHub Actions environment to run in'
        type: string
        default: production
    secrets:
      aws_role_arn:
        description: 'IAM role ARN to assume via OIDC'
        required: true

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY_IMAGE: ${{ inputs.registry_image }}
  AWS_REGION: us-east-1

jobs:
  release-draft:
    name: release-draft
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: write  # to create the draft GitHub Release
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: iwamot/actions/release-draft@dbe39b23ea600743e3fbb619d775ce08c61f753f # v2.0.1

  publish-ecr-public:
    needs: release-draft
    name: publish-ecr-public
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write  # to mint OIDC token for AWS role assumption
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
        with:
          registry-type: public

      - uses: iwamot/actions/docker-build-digest@dbe39b23ea600743e3fbb619d775ce08c61f753f # v2.0.1
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}
          platform: ${{ matrix.platform }}

  merge-and-sign:
    needs: publish-ecr-public
    name: merge-and-sign
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write  # to mint OIDC tokens for AWS role assumption, cosign, and attest
      attestations: write  # to write the provenance attestation
      artifact-metadata: write  # to record artifact metadata for the attestation
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.aws_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
        with:
          registry-type: public

      - uses: iwamot/actions/docker-merge-and-sign@dbe39b23ea600743e3fbb619d775ce08c61f753f # v2.0.1
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}

  release-publish:
    needs: merge-and-sign
    name: release-publish
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: write  # to flip the draft GitHub Release to published
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: iwamot/actions/release-publish@dbe39b23ea600743e3fbb619d775ce08c61f753f # v2.0.1
