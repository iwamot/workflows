name: Renovate

on:
  workflow_call:
    inputs:
      log-level:
        description: 'Log level'
        type: string
        default: 'info'
      environment:
        description: 'GitHub Actions environment to run in'
        type: string
        default: production
    secrets:
      RENOVATE_APP_CLIENT_ID:
        required: true
      RENOVATE_APP_PRIVATE_KEY:
        required: true
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      log-level:
        description: 'Log level'
        default: 'info'
        type: choice
        options:
          - info
          - debug
          - trace

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  renovate:
    name: renovate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment || 'production' }}
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Compose Renovate env
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -f mise.toml ]; then
            uv_version=$(python3 -c "import tomllib; d=tomllib.load(open('mise.toml','rb')); t=d.get('tools', {}).get('aqua:astral-sh/uv', ''); print(t.get('version', '') if isinstance(t, dict) else t)" 2>/dev/null || true)
            if [ -n "$uv_version" ]; then
              printf 'RENOVATE_CONSTRAINTS={"uv":"%s"}\n' "$uv_version" >> "$GITHUB_ENV"
            fi
          fi
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            printf 'RENOVATE_HOST_RULES=[{"matchHost":"dhi.io","hostType":"docker","username":"%s","password":"%s"}]\n' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" >> "$GITHUB_ENV"
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RENOVATE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-vulnerability-alerts: read
          permission-workflows: write
          permission-statuses: write
          permission-checks: write

      - name: Run Renovate
        uses: renovatebot/github-action@b50d2ba2bd928235abdcc14d06dfafc217f1c565 # v46.1.18
        with:
          configurationFile: .github/renovate.json
          token: ${{ steps.app-token.outputs.token }}
        env:
          LOG_LEVEL: ${{ inputs.log-level || 'info' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ALLOWED_UNSAFE_EXECUTIONS: '["mise"]'
