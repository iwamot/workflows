name: Release with GHCR publish

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub Actions environment to run in'
        type: string
        default: production
    secrets:
      dockerhub_username:
        description: 'Docker Hub username for dhi.io login (optional)'
        required: false
      dockerhub_token:
        description: 'Docker Hub token for dhi.io login (optional)'
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  release-draft:
    name: release-draft
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: write  # to create the draft GitHub Release
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: iwamot/actions/release-draft@fc024b0463f7096b399354cbfb2a97fcc77ec79d # v2.0.2

  publish-ghcr:
    needs: release-draft
    name: publish-ghcr
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write  # to push images to GHCR
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hardened Images
        if: env.DOCKERHUB_USERNAME != ''
        env:
          DOCKERHUB_USERNAME: ${{ secrets.dockerhub_username }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: dhi.io
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - uses: iwamot/actions/docker-build-digest@fc024b0463f7096b399354cbfb2a97fcc77ec79d # v2.0.2
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}
          platform: ${{ matrix.platform }}

  merge-and-sign:
    needs: publish-ghcr
    name: merge-and-sign
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write  # to mint OIDC tokens for cosign and attest
      packages: write  # to push the merged manifest to GHCR
      attestations: write  # to write the provenance attestation
      artifact-metadata: write  # to record artifact metadata for the attestation
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: iwamot/actions/docker-merge-and-sign@fc024b0463f7096b399354cbfb2a97fcc77ec79d # v2.0.2
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}

  release-publish:
    needs: merge-and-sign
    name: release-publish
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: write  # to flip the draft GitHub Release to published
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: iwamot/actions/release-publish@fc024b0463f7096b399354cbfb2a97fcc77ec79d # v2.0.2
