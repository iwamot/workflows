name: Release with GHCR publish

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub Actions environment to run in'
        type: string
        default: production
    secrets:
      dockerhub_username:
        description: 'Docker Hub username for dhi.io login (optional)'
        required: false
      dockerhub_token:
        description: 'Docker Hub token for dhi.io login (optional)'
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  release-draft:
    name: release-draft
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: write  # to create the draft GitHub Release
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: iwamot/actions/release-draft@09a90ef28919b6331a2930f6e61eeca11bc634de # v0.9.0

  publish-ghcr:
    needs: release-draft
    name: publish-ghcr
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write  # to push images to GHCR
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hardened Images
        if: env.DOCKERHUB_USERNAME != ''
        env:
          DOCKERHUB_USERNAME: ${{ secrets.dockerhub_username }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: dhi.io
          username: ${{ secrets.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - uses: iwamot/actions/docker-build-digest@09a90ef28919b6331a2930f6e61eeca11bc634de # v0.9.0
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}
          platform: ${{ matrix.platform }}

  merge-and-sign:
    needs: publish-ghcr
    name: merge-and-sign
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write  # to mint OIDC token for image signing
      packages: write  # to push the merged manifest to GHCR
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: iwamot/actions/docker-merge-and-sign@09a90ef28919b6331a2930f6e61eeca11bc634de # v0.9.0
        with:
          registry_image: ${{ env.REGISTRY_IMAGE }}

  release-publish:
    needs: merge-and-sign
    name: release-publish
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: write  # to flip the draft GitHub Release to published
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - uses: iwamot/actions/release-publish@09a90ef28919b6331a2930f6e61eeca11bc634de # v0.9.0
